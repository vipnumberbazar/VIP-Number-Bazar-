<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VIP Number Bazar - Admin Panel</title>

<link rel="stylesheet" href="admin.css">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

<header class="admin-header">

<h1>
<i class="fa-solid fa-user-shield"></i>
VIP Number Bazar Admin
</h1>

<a href="index.html" class="home-btn">
<i class="fa-solid fa-house"></i>
Home
</a>

</header>

<div class="container">

<div class="dashboard">

<div class="card">

<h3>Total VIP Numbers</h3>

<h2 id="totalNumbers">0</h2>

</div>

<div class="card">

<h3>Total Value</h3>

<h2 id="totalValue">₹0</h2>

</div>

<div class="card">

<h3>Today's Sales</h3>

<h2>₹0</h2>

</div>

</div>

<section class="add-number">

<h2>Add New VIP Number</h2>

<input
type="text"
id="vipNumber"
placeholder="Enter VIP Number">

<input
type="number"
id="vipPrice"
placeholder="Enter Price">

<select id="vipCategory">

<option value="Premium">Premium</option>

<option value="Gold">Gold</option>

<option value="Platinum">Platinum</option>

<option value="Silver">Silver</option>

</select>

<button onclick="addVIP()">

<i class="fa-solid fa-plus"></i>

Add VIP Number

</button>

</section>
<section class="vip-list-section">

<h2>VIP Number List</h2>

<div class="search-box">

<input
type="text"
id="searchInput"
placeholder="Search VIP Number...">

</div>

<div id="vipList">

<!-- VIP Numbers will appear here -->

</div>

</section>

</div>

<footer class="admin-footer">

<p>

© 2026 VIP Number Bazar Admin Panel

</p>

</footer>

<script type="module" src="admin.js"></script>

</body>

</html>
