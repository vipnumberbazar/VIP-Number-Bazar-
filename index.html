<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIP Number Bazar</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#f5f5f5;
}

header{
background:#ff6600;
color:white;
padding:20px;
text-align:center;
font-size:30px;
font-weight:bold;
}

.search{
padding:20px;
text-align:center;
}

input{
width:90%;
max-width:400px;
padding:12px;
font-size:18px;
}

.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,.2);
text-align:center;
}

.number{
font-size:28px;
font-weight:bold;
color:#ff6600;
}

.price{
font-size:22px;
margin:10px;
}

button{
background:#25D366;
color:white;
border:none;
padding:12px 25px;
font-size:18px;
border-radius:6px;
cursor:pointer;
}
</style>
</head>

<body>

<header>
VIP Number Bazar
</header>

<div class="search">
<input type="text" placeholder="Search VIP Number...">
</div>

<div class="container">

<div class="card">
<div class="number">9999999999</div>
<div class="price">₹5000</div>
<button>WhatsApp</button>
</div>

</div>

</body>
</html>
