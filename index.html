<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VIP Number Bazar</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
}

header{
background:#ff6600;
color:white;
padding:20px;
text-align:center;
font-size:30px;
font-weight:bold;
}

.search{
padding:20px;
text-align:center;
}

.search input{
width:95%;
max-width:500px;
padding:14px;
font-size:18px;
border:1px solid #ddd;
border-radius:8px;
}

.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 10px rgba(0,0,0,.15);
text-align:center;
}

.number{
font-size:28px;
font-weight:bold;
color:#ff6600;
margin-bottom:10px;
}

.price{
font-size:22px;
font-weight:bold;
margin-bottom:15px;
}

button{
background:#25D366;
color:white;
border:none;
padding:12px 20px;
border-radius:8px;
font-size:18px;
cursor:pointer;
}
</style>
</head>

<body>

<header>
VIP Number Bazar
</header>

<div class="search">
<input type="text" id="search" placeholder="Search VIP Number...">
</div>

<div class="container" id="numbers">
</div>
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getFirestore,
collection,
getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAWD14Nf9l7HlFrPMsHijREOHoGrxeehok",
  authDomain: "vipnumberbazar-73e51.firebaseapp.com",
  projectId: "vipnumberbazar-73e51",
  storageBucket: "vipnumberbazar-73e51.firebasestorage.app",
  messagingSenderId: "756745745147",
  appId: "1:756745745147:web:e8dcd216eda572c440f65e",
  measurementId: "G-ZTB2EEZVQ1"
};6745745147:web:e8dcd216eda572c440f65e"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const container = document.getElementById("numbers");

async function loadNumbers(){

const snapshot = await getDocs(collection(db,"numbers"));

snapshot.forEach((doc)=>{

const data = doc.data();

container.innerHTML += `
<div class="card">
<div class="number">${data.number}</div>
<div class="price">₹${data.Price}</div>

<button onclick="window.open('https://wa.me/91YOURNUMBER?text=I want VIP Number ${data.number}')">
WhatsApp
</button>

</div>
`;

});

}

loadNumbers();

</script>

</body>
</html>
